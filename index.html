<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EARING | Premium Collection</title>
    <link rel="stylesheet" href="style.css">
    <!-- FontAwesome Icons for Beautiful UX -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar">
        <div class="logo">EARING</div>
        <div class="nav-icons">
            <div class="cart-icon">
                <i class="fas fa-shopping-bag"></i>
                <span id="cart-count">0</span>
            </div>
        </div>
    </nav>

    <!-- Hero Banner -->
    <header class="hero-section">
        <div class="hero-content">
            <h1>Premium Earrings At Lower Price</h1>
            <p>Elevate your style with our exclusive handcrafted collection.</p>
        </div>
    </header>

    <!-- Main Content (Product Grid) -->
    <main class="container">
        <h2 class="section-title">Our Exclusive Collection</h2>
        <div id="product-grid" class="product-grid">
            <!-- Products will be injected dynamically by script.js -->
        </div>
    </main>

    <!-- Connect & Social Section -->
    <section class="contact-section">
        <div class="container">
            <h2 class="section-title">Connect With Us</h2>
            <div class="contact-grid">
                <!-- WhatsApp -->
                <a href="https://wa.me/917507726901?text=Hi%20Raj,%20I%20am%20interested%20in%20your%20earring%20collection!" target="_blank" class="contact-card whatsapp">
                    <i class="fab fa-whatsapp"></i>
                    <h3>WhatsApp</h3>
                    <p>+91 7507726901</p>
                </a>
                
                <!-- Instagram -->
                <a href="https://www.instagram.com/raj__0.5k_?igsh=cjlkcjJybXJlaGJ6" target="_blank" class="contact-card instagram">
                    <i class="fab fa-instagram"></i>
                    <h3>Instagram</h3>
                    <p>@raj__0.5k_</p>
                </a>

                <!-- Call Support -->
                <a href="tel:+919657869021" class="contact-card call">
                    <i class="fas fa-phone-alt"></i>
                    <h3>Call Us</h3>
                    <p>+91 9657869021</p>
                </a>
            </div>
        </div>
    </section>

    <!-- Smart Order Modal Form -->
    <div id="orderModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <i class="fab fa-whatsapp modal-wa-icon"></i>
            <h2>Complete Your Order</h2>
            <p id="modal-product-display" style="font-weight: 600; color: #d4af37; margin-bottom: 15px;"></p>
            <div class="input-group">
                <input type="text" id="userName" placeholder="Your Name" required>
            </div>
            <div class="input-group">
                <input type="text" id="userAddress" placeholder="Your Delivery Address (Full Address)" required>
            </div>
            <button class="modal-buy-btn" onclick="sendOrder()">
                Confirm & Order via WhatsApp
            </button>
        </div>
    </div>

    <!-- Modern Footer -->
    <footer>
        <p>&copy; 2026 EARING. Powered by Raj. All Rights Reserved.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
