<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Royal Atelier Admin</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

    <div class="dashboard">
        <h1 class="title">
            <i class="fa-solid fa-crown"></i> ADMIN VAULT
        </h1>

        <div class="panel" style="border-color: #ff4444;">
            <h2 style="color: #ff4444;">Danger Zone (Stock Control)</h2>
            <p style="color: #bbb; margin-bottom: 15px;">Ek click me website aur cloud database se saare items hatane ke liye niche click karein:</p>
            <button class="gold-btn" onclick="clearAllStock()" style="border-color: #ff4444; color: #ff4444; font-weight: bold;">
                <i class="fa-solid fa-trash-can"></i> RESET & CLEAR ALL STOCK
            </button>
        </div>

        <div class="panel">
            <h2>Brand Settings</h2>
            <input id="brandName" placeholder="Enter Brand Name">
            <br><br>
            <button class="gold-btn" onclick="saveBrand()">Update Brand</button>
        </div>

        <div class="panel">
            <h2>Add New Masterpiece</h2>
            <input id="pname" placeholder="Product Name"><br><br>
            <input id="price" placeholder="Price"><br><br>
            <select id="ptype">
                <option>Ring</option>
                <option>Necklace</option>
                <option>Earrings</option>
                <option>Bracelet</option>
            </select><br><br>
            <input id="image" placeholder="Exact Image Name (e.g. 1782475435503.png)">
            <br><br>
            <button class="gold-btn" onclick="addProduct()">Add Product</button>
        </div>

        <div class="panel">
            <h2>Live Inventory (Cloud Sync)</h2>
            <div style="overflow-x: auto;">
                <table>
                    <thead>
                        <tr>
                            <th>Image</th>
                            <th>Name</th>
                            <th>Price</th>
                            <th>Category</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="adminList"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="toast" id="toast">Updated</div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <script src="script.js"></script>
</body>
</html>
